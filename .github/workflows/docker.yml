name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'resources/Dockerfile'
      - 'resources/entrypoint.sh'
      - '.github/workflows/docker.yml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inject git commit hash into version.ts
        run: echo "export const VERSION = '$(git rev-parse --short HEAD)'" > src/shared/version.ts

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: resources
          file: resources/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/clauboy-agent:latest
          build-args: |
            CLAUDE_CLI_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
