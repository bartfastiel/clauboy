appId: com.clauboy.app
productName: Clauboy
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
includeSubNodeModules: true
